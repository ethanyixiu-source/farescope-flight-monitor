name: FareScope flight monitor

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fare-monitor.yml"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: farescope-flight-monitor
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare FareScope runtime
        shell: bash
        run: |
          mkdir -p runtime
          echo '' | base64 --decode | tar -xzf - -C runtime
          if [ -d public/data ]; then
            cp public/data/*.json runtime/public/data/
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: runtime/package-lock.json
          package-manager-cache: false

      - name: Install dependencies
        working-directory: runtime
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Chromium
        working-directory: runtime
        run: npx playwright install --with-deps chromium

      - name: Scrape monitored routes
        working-directory: runtime
        run: npm run crawler:run
        env:
          FARESCOPE_OUTPUT_PATH: /tmp/farescope-crawl.json
          FARESCOPE_PREVIOUS_DATA_PATH: public/data/dashboard.json

      - name: Merge static price history
        working-directory: runtime
        run: npm run crawler:static -- --batch /tmp/farescope-crawl.json --output public/data

      - name: Test and build
        working-directory: runtime
        run: npm test

      - name: Save updated public data
        shell: bash
        run: |
          mkdir -p public/data
          cp runtime/public/data/*.json public/data/
          git config user.name "farescope-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if git diff --cached --quiet; then
            echo "No public data changes"
          else
            git commit -m "data: update flight prices [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: runtime/dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
