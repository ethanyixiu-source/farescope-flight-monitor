name: FareScope flight monitor

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: farescope-flight-monitor
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Prepare crawler
        env:
          CRAWLER_BUNDLE: 
        run: |
          mkdir runtime
          printf '%s' "$CRAWLER_BUNDLE" | base64 -d > crawler.tar.gz
          tar -xzf crawler.tar.gz -C runtime
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
        working-directory: runtime
      - name: Install browser
        run: npx playwright install --with-deps chromium
        working-directory: runtime
      - name: Scrape and upload
        run: npm run crawler:run
        working-directory: runtime
        env:
          FARESCOPE_INGEST_URL: ${{ secrets.FARESCOPE_INGEST_URL }}
          FARESCOPE_INGEST_SECRET: ${{ secrets.FARESCOPE_INGEST_SECRET }}
          FARESCOPE_SITES_BYPASS_TOKEN: ${{ secrets.FARESCOPE_SITES_BYPASS_TOKEN }}
